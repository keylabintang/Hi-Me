<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Hi-Me — Mental Health Consultation</title>
  <link rel="stylesheet" href="css/global.css">
  <style>
    .landing-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #FAFBFF;
      overflow-y: auto;
      scrollbar-width: none;
    }
    .landing-wrap::-webkit-scrollbar { display: none; }

    .top-bar {
      display: flex; align-items: center; justify-content: flex-end;
      padding: 16px 24px 0;
      flex-shrink: 0;
    }
    .login-link {
      font-size: 13px; font-weight: 700; color: var(--primary);
      cursor: pointer; padding: 6px 16px;
      border: 1.5px solid var(--primary);
      border-radius: 20px;
      transition: all .15s;
    }
    .login-link:active { background: var(--primary-pale); }

    /* Hero center */
    .hero-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 28px 28px 28px;
      position: relative;
    }

    /* Dot pattern background */
    .hero-section::before {
      content: '';
      position: absolute; inset: 0;
      background-image: radial-gradient(circle, #CBD5E1 1px, transparent 1px);
      background-size: 22px 22px;
      opacity: .45;
      z-index: 0;
      pointer-events: none;
    }

    .hero-section > * { position: relative; z-index: 1; }

    /* Logo */
    .logo-wrap {
      margin-bottom: 8px;
      animation: logoIn .65s cubic-bezier(.34,1.56,.64,1) both;
    }
    .logo-img {
      width: 250px; height: 250px;
      object-fit: contain;
      filter: drop-shadow(0 8px 24px rgba(62,94,220,.18));
    }
    @keyframes logoIn {
      from { opacity: 0; transform: scale(.65) translateY(12px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Title */
    .hero-title {
      font-size: 28px; font-weight: 900;
      color: var(--text-primary);
      letter-spacing: -1.2px; line-height: 1.12;
      margin-bottom: 38px;
      animation: fadeUp .5s .15s both;
    }
    .hero-title .accent { color: var(--primary); }

    /* Subtitle */
    .hero-sub {
      font-size: 14px; color: var(--text-muted);
      line-height: 1.7; max-width: 270px;
      margin: 0 auto 32px;
      animation: fadeUp .5s .25s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* CTA */
    .cta-group {
      width: 100%; max-width: 300px;
      display: flex; flex-direction: column; gap: 10px;
      animation: fadeUp .5s .35s both;
    }
    .btn-primary-cta {
      width: 100%; height: 52px;
      background: var(--primary); color: white;
      border: none; border-radius: 14px;
      font-size: 15px; font-weight: 800;
      font-family: 'Plus Jakarta Sans', sans-serif;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(62,94,220,.28);
      transition: all .15s; letter-spacing: -.2px;
    }
    .btn-primary-cta:active { transform: scale(.97); box-shadow: none; }

    .btn-outline-cta {
      width: 100%; height: 50px;
      background: white; color: var(--text-primary);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      font-size: 14px; font-weight: 700;
      font-family: 'Plus Jakarta Sans', sans-serif;
      cursor: pointer; transition: all .15s;
    }
    .btn-outline-cta:active { background: var(--bg); border-color: var(--border-dark); }

    .divider-or {
      display: flex; align-items: center; gap: 10px;
      color: var(--text-placeholder); font-size: 12px; font-weight: 600;
    }
    .divider-or::before, .divider-or::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* Footer */
    .landing-footer {
      padding: 16px 20px 28px;
      text-align: center; flex-shrink: 0;
    }
    .footer-text {
      font-size: 11px; color: var(--text-placeholder); line-height: 1.7;
    }
    .footer-text span {
      color: var(--primary); font-weight: 700; cursor: pointer;
    }
  </style>
</head>
<body>
<div class="phone" style="overflow:hidden;">
  <!-- Status Bar -->
  <div class="statusbar" style="position:absolute;top:0;left:0;right:0;z-index:50;background:transparent;">
    <span class="sb-time" style="color:var(--text-secondary);">09:41</span>
    <div class="sb-icons" style="color:var(--text-secondary);"><span>5G</span><span>🔋</span></div>
  </div>

  <div class="landing-wrap">
    <!-- Top bar -->
    <!-- <div class="top-bar" style="margin-top:44px;">
      <div class="login-link" onclick="go('login')">Masuk</div>
    </div> -->

    <!-- Hero -->
    <div class="hero-section">
      <!-- Logo -->
      <div class="logo-wrap">
        <img class="logo-img" src="logo.png" alt="Hi-Me">
      </div>

      <!-- Title -->
      <div class="hero-title">
        <!-- Ruang aman<br>untuk <span class="accent">mental</span>mu -->
        <span class="accent">Online Psychology</span><br>Consultation Platform
      </div>


      <!-- CTA buttons -->
      <div class="cta-group">
        <button class="btn-primary-cta" onclick="go('chat-bot')">Konsultasi Sekarang</button>
        <div class="divider-or">atau</div>
        <button class="btn-outline-cta" onclick="go('login')">Login</button>
        <button class="btn-outline-cta" onclick="go('register')">Register</button>
      </div>
    </div>

    <!-- Footer -->
    <div class="landing-footer">
      <div class="footer-text">
        Dengan mendaftar, kamu menyetujui<br>
        <span onclick="toast('Syarat & Ketentuan')">Syarat & Ketentuan</span>
        &nbsp;·&nbsp;
        <span onclick="toast('Kebijakan Privasi')">Kebijakan Privasi</span>
      </div>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
  Object.assign(ROUTES, {
    consultation: 'pages/consultation/index.html',
    register:     'pages/auth/register.html',
    login:        'pages/auth/login.html',
    'chat-bot':   'pages/chat/bot.html',
    dashboard:    'pages/dashboard/index.html',
  });
</script>
</body>
</html>
