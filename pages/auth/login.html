<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Masuk — Hi-Me</title>
  <link rel="stylesheet" href="../../css/global.css">
  <style>
    .auth-hero {
      background: linear-gradient(155deg, var(--green-900), var(--green-700));
      padding: 0 24px 52px;
      position: relative; overflow: hidden;
    }
    .auth-hero::before {
      content: '';
      position: absolute; bottom: -60px; left: -60px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(82,183,136,.2) 0%, transparent 70%);
      border-radius: 50%;
    }
    .auth-hero::after {
      content: '';
      position: absolute; bottom: -1px; left: 0; right: 0;
      height: 40px; background: var(--bg); border-radius: 40px 40px 0 0;
    }
    .hero-back {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.2);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: white; font-size: 18px;
      transition: all .15s;
    }
    .hero-back:active { transform: scale(.92); background: rgba(255,255,255,.25); }
    .auth-tag {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 100px;
      background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.18);
      font-size: 11px; font-weight: 700; color: rgba(255,255,255,.85);
      margin-bottom: 14px;
    }
    .auth-title { font-family: 'DM Serif Display', serif; font-size: 32px; color: white; line-height: 1.15; }
    .auth-title em { color: var(--green-300); font-style: italic; }
    .auth-desc { font-size: 13px; color: rgba(255,255,255,.65); margin-top: 6px; }

    .auth-body { padding: 28px 20px 20px; }
    .forgot-row { text-align: right; margin-bottom: 20px; margin-top: -8px; }
    .forgot-link { font-size: 12px; font-weight: 700; color: var(--primary); cursor: pointer; }

    .register-prompt { text-align: center; font-size: 13px; color: var(--text-muted); margin-top: 20px; }
    .register-prompt span { color: var(--primary); font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>
<div class="phone">
  <div class="statusbar light" style="position:absolute; top:0; left:0; right:0; z-index:50;">
    <span class="sb-time">09:41</span>
    <div class="sb-icons"><span>5G</span><span>🔋</span></div>
  </div>

  <div class="scroll-area">
    <div class="auth-hero">
      <div style="height: 56px;"></div>
      <div style="margin-bottom: 22px;">
        <div class="hero-back" onclick="goBack()">←</div>
      </div>
      <div class="anim-fade-up">
        <div class="auth-tag">Selamat datang kembali</div>
        <h1 class="auth-title">Masuk ke<br><em>Hi-Me</em></h1>
        <p class="auth-desc">Lanjutkan perjalanan kesehatan mentalmu</p>
      </div>
      <div style="height: 40px;"></div>
    </div>

    <div class="auth-body anim-fade-up">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="emailInput" placeholder="nama@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Kata Sandi</label>
        <div class="input-wrap">
          <input type="password" class="form-input" id="passInput" placeholder="Minimal 8 karakter" autocomplete="current-password">
          <span class="input-trail" onclick="togglePass('passInput', this)" id="eyeIcon">👁</span>
        </div>
      </div>
      <div class="forgot-row">
        <span class="forgot-link" onclick="handleForgot()">Lupa kata sandi?</span>
      </div>

      <button class="btn btn-primary" id="loginBtn" onclick="handleLogin()">Masuk</button>

      <div style="margin: 20px 0; display:flex; align-items:center; gap:12px;">
        <div class="divider" style="flex:1;"></div>
        <span style="font-size:12px; color:var(--text-muted); font-weight:600;">atau masuk dengan</span>
        <div class="divider" style="flex:1;"></div>
      </div>

      <div style="display:flex; flex-direction:column; gap:10px;">
        <button class="social-btn" onclick="handleSocial('Google')">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Google
        </button>
        <button class="social-btn" onclick="handleSocial('Apple')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.54 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2-.156-3.675 1.09-4.61 1.09z"/><path d="M15.53 3.83c.843-1.012 1.4-2.427 1.245-3.83-1.207.052-2.662.805-3.532 1.818-.78.896-1.454 2.338-1.273 3.714 1.338.104 2.715-.688 3.559-1.701z"/></svg>
          Apple
        </button>
      </div>

      <p class="register-prompt">Belum punya akun? <span onclick="go('register')">Daftar gratis</span></p>
      <div style="height: 20px;"></div>
    </div>
  </div>
</div>

<script src="../../js/app.js"></script>
<script>
  Object.assign(ROUTES, {
    register:  'register.html',
    dashboard: '../dashboard/index.html',
    landing:   '../../index.html',
    'chat-bot': '../chat/bot.html',
  });

  function togglePass(inputId, eyeEl) {
    const inp = document.getElementById(inputId);
    if (inp.type === 'password') {
      inp.type = 'text'; eyeEl.textContent = '🙈';
    } else {
      inp.type = 'password'; eyeEl.textContent = '👁';
    }
  }

  function handleLogin() {
    const email = document.getElementById('emailInput').value.trim();
    const pass  = document.getElementById('passInput').value;
    if (!email) { toast('Masukkan email kamu dulu ya'); return; }
    if (!pass)  { toast('Masukkan kata sandi kamu'); return; }
    if (pass.length < 8) { toast('Kata sandi minimal 8 karakter'); return; }

    const btn = document.getElementById('loginBtn');
    btn.innerHTML = '<div class="spinner"></div> Masuk...';
    btn.disabled = true;

    setTimeout(() => {
      const name = email.split('@')[0];
      const initials = name.slice(0, 2).toUpperCase();
      App.login({ name, email, initials, avatar: '' });
      const redirect = sessionStorage.getItem('hime_post_login_redirect');
      if (redirect) {
        sessionStorage.removeItem('hime_post_login_redirect');
        window.location.href = redirect;
      } else {
        go('dashboard');
      }
    }, 1300);
  }

  function handleSocial(provider) {
    toast(`Menghubungkan ke ${provider}...`);
    setTimeout(() => {
      App.login({ name: `Pengguna ${provider}`, email: `user@${provider.toLowerCase()}.com`, initials: provider.slice(0,2).toUpperCase(), avatar: '' });
      const redirect = sessionStorage.getItem('hime_post_login_redirect');
      if (redirect) {
        sessionStorage.removeItem('hime_post_login_redirect');
        window.location.href = redirect;
      } else {
        go('dashboard');
      }
    }, 1000);
  }

  function handleForgot() {
    toast('Link reset kata sandi dikirim ke email kamu');
  }
</script>
</body>
</html>
