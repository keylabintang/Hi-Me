<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pembayaran Berhasil — Hi-Me</title>
  <link rel="stylesheet" href="../../css/global.css">
</head>
<body>
<div class="phone">
  <div class="statusbar dark"><span class="sb-time">09:41</span><div class="sb-icons"><span>5G</span><span>🔋</span></div></div>
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;padding:32px;text-align:center;gap:16px;">
    <div style="font-size:64px;">✅</div>
    <h2 style="font-size:22px;font-weight:800;color:var(--text-primary);">Pembayaran Berhasil</h2>
    <p style="font-size:14px;color:var(--text-muted);max-width:260px;line-height:1.6;">Booking kamu sudah dikonfirmasi!</p>
    <div style="background:var(--primary-pale);border:1.5px solid var(--primary);border-radius:var(--r-md);padding:12px 20px;">
      <p style="font-size:13px;font-weight:700;color:var(--primary);">Akan tersedia di Phase 1.2</p>
    </div>
    <button class="btn btn-ghost" style="width:auto;padding:12px 24px;" onclick="history.back()">← Kembali</button>
  </div>
</div>
<script src="../../js/app.js"></script>
</body>
</html>
