<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Masuk untuk Lanjut — Hi-Me</title>
  <link rel="stylesheet" href="../../css/global.css">
  <style>
    .topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px; background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-xs); flex-shrink: 0;
    }
    .tb-back {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--bg); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all .15s; flex-shrink: 0;
    }
    .tb-back:active { transform: scale(.92); }
    .tb-back svg { width: 16px; height: 16px; stroke: var(--text-primary); fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .tb-title { font-size: 16px; font-weight: 800; color: var(--text-primary); }
    .tb-step { margin-left: auto; font-size: 11px; font-weight: 700; color: var(--text-muted); background: var(--bg); border: 1px solid var(--border); border-radius: 100px; padding: 4px 10px; }

    .page-body { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; gap: 0; overflow-y: auto; }

    /* Progress steps */
    .steps-row {
      display: flex; align-items: center; gap: 0;
      width: 100%; max-width: 320px; margin-bottom: 36px;
    }
    .step-item { display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; }
    .step-circle {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800;
    }
    .step-circle.done { background: var(--primary); color: white; }
    .step-circle.active { background: var(--primary); color: white; box-shadow: 0 0 0 3px var(--primary-pale); }
    .step-circle.idle { background: var(--bg); border: 1.5px solid var(--border); color: var(--text-muted); }
    .step-label { font-size: 9px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .4px; text-align: center; }
    .step-label.active { color: var(--primary); }
    .step-line { flex: 1; height: 2px; background: var(--border); margin-bottom: 18px; }
    .step-line.done { background: var(--primary); }

    /* Booking summary card */
    .booking-card {
      width: 100%; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: var(--r-lg);
      padding: 16px; margin-bottom: 24px;
      box-shadow: var(--shadow-xs);
    }
    .bc-title { font-size: 12px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; }
    .bc-expert { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .bc-av { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 900; flex-shrink: 0; }
    .bc-ename { font-size: 13px; font-weight: 800; color: var(--text-primary); }
    .bc-erole { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .bc-rows { display: flex; flex-direction: column; gap: 7px; }
    .bc-row { display: flex; justify-content: space-between; align-items: center; }
    .bc-row-label { font-size: 12px; color: var(--text-muted); }
    .bc-row-val { font-size: 12px; font-weight: 700; color: var(--text-primary); }
    .bc-row-val.price { color: var(--primary); font-size: 13px; }

    /* Auth buttons */
    .auth-title { font-size: 17px; font-weight: 800; color: var(--text-primary); margin-bottom: 6px; text-align: center; }
    .auth-sub { font-size: 13px; color: var(--text-muted); text-align: center; margin-bottom: 20px; line-height: 1.5; }
    .auth-btns { display: flex; flex-direction: column; gap: 10px; width: 100%; }
    .auth-btn {
      width: 100%; padding: 15px; border-radius: var(--r-lg);
      font-size: 15px; font-weight: 800; cursor: pointer;
      transition: all .15s; font-family: 'Plus Jakarta Sans', sans-serif;
      border: none; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .auth-btn.primary { background: var(--primary); color: white; box-shadow: 0 4px 14px rgba(62,94,220,.3); }
    .auth-btn.primary:active { transform: scale(.98); }
    .auth-btn.ghost { background: var(--bg-card); color: var(--primary); border: 1.5px solid var(--primary); }
    .auth-btn.ghost:active { background: var(--primary-pale); }
    .auth-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .auth-note { margin-top: 16px; font-size: 11px; color: var(--text-muted); text-align: center; line-height: 1.5; }
  </style>
</head>
<body>
<div class="phone" style="display:flex;flex-direction:column;">
  <div class="statusbar"><span class="sb-time">09:41</span><div class="sb-icons"><span>5G</span><span>&#x1F50B;</span></div></div>

  <div class="topbar">
    <div class="tb-back" onclick="history.back()">
      <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </div>
    <div class="tb-title">Hampir Selesai!</div>
    <div class="tb-step">Langkah 4 dari 4</div>
  </div>

  <div class="page-body">
    <!-- Progress steps -->
    <div class="steps-row">
      <div class="step-item">
        <div class="step-circle done">&#10003;</div>
        <div class="step-label">Jenis</div>
      </div>
      <div class="step-line done"></div>
      <div class="step-item">
        <div class="step-circle done">&#10003;</div>
        <div class="step-label">Expert</div>
      </div>
      <div class="step-line done"></div>
      <div class="step-item">
        <div class="step-circle done">&#10003;</div>
        <div class="step-label">Jadwal</div>
      </div>
      <div class="step-line done"></div>
      <div class="step-item">
        <div class="step-circle active">4</div>
        <div class="step-label active">Akun</div>
      </div>
    </div>

    <!-- Booking summary -->
    <div class="booking-card" id="bookingCard">
      <!-- filled by JS -->
    </div>

    <div class="auth-title">Masuk untuk melanjutkan</div>
    <div class="auth-sub">Jadwalmu sudah tersimpan. Masuk atau daftar dulu untuk melakukan pembayaran.</div>

    <div class="auth-btns">
      <button class="auth-btn primary" onclick="goRegister()">
        <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        Daftar Gratis
      </button>
      <button class="auth-btn ghost" onclick="goLogin()">
        <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Sudah punya akun? Masuk
      </button>
    </div>

    <div class="auth-note">Gratis mendaftar &middot; Tidak diperlukan kartu kredit<br>Datamu aman &amp; terlindungi</div>
  </div>
</div>

<script src="../../js/app.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    // If already logged in, go directly to payment
    if (App.isLoggedIn()) {
      window.location.href = '../../pages/payment/index.html';
      return;
    }

    // Render booking summary from sessionStorage
    const raw = sessionStorage.getItem('hime_payment');
    if (!raw) return;
    const p = JSON.parse(raw);
    const expert = DATA.experts.find(e => e.id === p.expertId);
    if (!expert) return;

    const JENIS_LABELS = { chat: 'Chat Online', call: 'Voice Call', offline: 'Tatap Muka' };

    document.getElementById('bookingCard').innerHTML = `
      <div class="bc-title">Ringkasan Konsultasi</div>
      <div class="bc-expert">
        <div class="bc-av" style="background:${expert.color};color:${expert.textColor};">${expert.init}</div>
        <div>
          <div class="bc-ename">${expert.name}</div>
          <div class="bc-erole">${expert.role}</div>
        </div>
      </div>
      <div class="bc-rows">
        <div class="bc-row">
          <span class="bc-row-label">Jenis sesi</span>
          <span class="bc-row-val">${JENIS_LABELS[p.type] || p.type}</span>
        </div>
        <div class="bc-row">
          <span class="bc-row-label">Tanggal</span>
          <span class="bc-row-val">${p.date || '-'}</span>
        </div>
        <div class="bc-row">
          <span class="bc-row-label">Waktu</span>
          <span class="bc-row-val">${p.time || '-'}</span>
        </div>
        <div class="bc-row">
          <span class="bc-row-label">Durasi</span>
          <span class="bc-row-val">${p.duration || 60} menit</span>
        </div>
        <div class="bc-row">
          <span class="bc-row-label" style="font-weight:800;color:var(--text-primary);">Total</span>
          <span class="bc-row-val price">Rp ${(p.price||0).toLocaleString('id-ID')}</span>
        </div>
      </div>
    `;
  });

  function goRegister() {
    sessionStorage.setItem('hime_post_login_redirect', '../../pages/payment/index.html');
    window.location.href = '../../pages/auth/register.html';
  }

  function goLogin() {
    sessionStorage.setItem('hime_post_login_redirect', '../../pages/payment/index.html');
    window.location.href = '../../pages/auth/login.html';
  }
</script>
</body>
</html>
