<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Call — Hi-Me</title>
  <link rel="stylesheet" href="../../css/global.css">
  <style>
    .call-wrap {
      flex: 1;
      background: linear-gradient(180deg, #0F172A, #1E293B);
      color: white;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    .call-top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 16px 10px;
      z-index: 2;
    }
    .call-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,.3);
      background: rgba(255,255,255,.12); color: white;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .remote-video {
      flex: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 6px;
    }
    .remote-avatar {
      width: 110px; height: 110px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; font-weight: 800;
      border: 3px solid rgba(255,255,255,.3);
    }
    .remote-name { font-size: 19px; font-weight: 800; }
    .remote-sub { font-size: 13px; opacity: .75; }
    .call-timer { font-size: 14px; opacity: .9; font-variant-numeric: tabular-nums; margin-top: 4px; }
    .pip {
      position: absolute; right: 16px; top: 70px;
      width: 92px; height: 132px; border-radius: 14px;
      background: rgba(255,255,255,.18);
      border: 1px solid rgba(255,255,255,.26);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
      z-index: 2;
    }
    .call-actions {
      display: flex; align-items: center; justify-content: center; gap: 16px;
      padding: 16px 20px 24px;
      z-index: 2;
    }
    .act-btn {
      width: 52px; height: 52px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,.35);
      background: rgba(255,255,255,.14); color: white;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 20px;
    }
    .act-btn.end {
      width: 62px; height: 62px; background: #EF4444; border-color: transparent;
      font-size: 24px;
    }
  </style>
</head>
<body>
<div class="phone" style="display:flex;flex-direction:column;">
  <div class="call-wrap">
    <div class="call-top">
      <div class="call-btn" onclick="go('chat-room', { expertId: currentExpert?.id || 1, mode: 'call' })">←</div>
      <div style="font-size:12px;opacity:.8;">Call</div>
      <div class="call-btn" onclick="toast('Pengaturan call')">⋯</div>
    </div>

    <div class="pip">Kamera Kamu</div>

    <div class="remote-video">
      <div class="remote-avatar" id="remoteAvatar">AW</div>
      <div class="remote-name" id="remoteName">Dr. Amara Wijaya</div>
      <div class="remote-sub" id="remoteSub">Psikolog Klinis</div>
      <div class="call-timer" id="callTimer">00:00</div>
    </div>

    <div class="call-actions">
      <button class="act-btn" onclick="toast('Mute mic')">🎤</button>
      <button class="act-btn" onclick="toast('Switch camera')">🔄</button>
      <button class="act-btn end" onclick="endCall()">📞</button>
      <button class="act-btn" onclick="toast('Speaker')">🔊</button>
      <button class="act-btn" onclick="go('chat-room', { expertId: currentExpert?.id || 1 })">💬</button>
    </div>
  </div>
</div>

<script src="../../js/app.js"></script>
<script>
  const params = getParams();
  const currentExpert = DATA.experts.find(e => e.id == (params.expertId || 1)) || DATA.experts[0];
  document.getElementById('remoteAvatar').textContent = currentExpert.init;
  document.getElementById('remoteAvatar').style.background = currentExpert.color;
  document.getElementById('remoteAvatar').style.color = currentExpert.textColor;
  document.getElementById('remoteName').textContent = currentExpert.name;
  document.getElementById('remoteSub').textContent = currentExpert.role;

  let sec = 0;
  setInterval(() => {
    sec++;
    const mm = String(Math.floor(sec / 60)).padStart(2, '0');
    const ss = String(sec % 60).padStart(2, '0');
    document.getElementById('callTimer').textContent = `${mm}:${ss}`;
  }, 1000);

  function endCall() {
    toast('Sesi call diakhiri');
    setTimeout(() => go('chat-room', { expertId: currentExpert?.id || 1, mode: 'call' }), 400);
  }
</script>
</body>
</html>
