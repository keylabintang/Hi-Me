<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Voice Call — Hi-Me</title>
  <link rel="stylesheet" href="../../css/global.css">
  <style>
    .call-screen {
      flex: 1;
      background: linear-gradient(175deg, #1a1f3a 0%, #23294d 55%, #1a1f3a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    /* Subtle ambient glow circles */
    .glow-1, .glow-2 {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }
    .glow-1 {
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(62,94,220,.14) 0%, transparent 70%);
      top: 60px; left: 50%; transform: translateX(-50%);
    }
    .glow-2 {
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(93,186,132,.10) 0%, transparent 70%);
      bottom: 160px; right: 20px;
    }

    /* Top bar */
    .call-topbar {
      width: 100%;
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px 0;
      z-index: 2;
    }
    .topbar-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,.2);
      background: rgba(255,255,255,.08);
      color: white; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all .15s;
    }
    .topbar-btn:active { background: rgba(255,255,255,.18); }
    .topbar-label {
      font-size: 12px; font-weight: 700;
      color: rgba(255,255,255,.55);
      letter-spacing: .5px; text-transform: uppercase;
    }

    /* Center — avatar + info */
    .call-center {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 2; padding-bottom: 20px;
    }

    /* Pulsing ring around avatar */
    .avatar-ring-wrap {
      position: relative;
      margin-bottom: 24px;
    }
    .pulse-ring {
      position: absolute; inset: -14px;
      border-radius: 50%;
      border: 1.5px solid rgba(62,94,220,.35);
      animation: pulseRing 2.2s ease-out infinite;
    }
    .pulse-ring-2 {
      position: absolute; inset: -28px;
      border-radius: 50%;
      border: 1px solid rgba(62,94,220,.18);
      animation: pulseRing 2.2s .6s ease-out infinite;
    }
    .pulse-ring-3 {
      position: absolute; inset: -44px;
      border-radius: 50%;
      border: 1px solid rgba(62,94,220,.10);
      animation: pulseRing 2.2s 1.2s ease-out infinite;
    }
    @keyframes pulseRing {
      0%   { transform: scale(.92); opacity: 0; }
      30%  { opacity: 1; }
      100% { transform: scale(1.08); opacity: 0; }
    }

    .call-avatar {
      width: 100px; height: 100px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 34px; font-weight: 900;
      border: 3px solid rgba(255,255,255,.25);
      box-shadow: 0 8px 32px rgba(0,0,0,.35);
      position: relative; z-index: 1;
      transition: transform .15s;
    }

    .call-name {
      font-size: 22px; font-weight: 900; color: white;
      letter-spacing: -.4px; margin-bottom: 6px;
    }
    .call-role {
      font-size: 13px; color: rgba(255,255,255,.55);
      font-weight: 600; margin-bottom: 16px;
    }

    /* Status / timer */
    .call-status-wrap {
      display: flex; align-items: center; gap: 8px;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #4ADE80;
      animation: blink 1.6s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; } 50% { opacity: .3; }
    }
    .call-timer {
      font-size: 15px; font-weight: 700;
      color: rgba(255,255,255,.85);
      font-variant-numeric: tabular-nums;
      letter-spacing: .5px;
    }
    .call-timer.connecting {
      color: rgba(255,255,255,.55);
      font-size: 13px; letter-spacing: .3px;
    }

    /* Action buttons row */
    .call-actions {
      width: 100%;
      padding: 0 28px 52px;
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
    }

    /* Main controls */
    .ctrl-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }

    .ctrl-btn {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .ctrl-circle {
      width: 64px; height: 64px; border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,.2);
      background: rgba(255,255,255,.10);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; cursor: pointer;
      transition: all .15s;
      backdrop-filter: blur(4px);
    }
    .ctrl-circle:active { transform: scale(.93); background: rgba(255,255,255,.2); }
    .ctrl-circle.active {
      background: rgba(255,255,255,.22);
      border-color: rgba(255,255,255,.5);
    }
    .ctrl-label {
      font-size: 11px; font-weight: 700;
      color: rgba(255,255,255,.55);
      letter-spacing: .3px;
    }

    /* End call button — centered, larger */
    .end-btn-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .end-circle {
      width: 72px; height: 72px; border-radius: 50%;
      background: #EF4444;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; cursor: pointer;
      box-shadow: 0 6px 24px rgba(239,68,68,.45);
      transition: all .15s;
    }
    .end-circle:active { transform: scale(.93); box-shadow: none; }
    .end-label {
      font-size: 11px; font-weight: 700;
      color: rgba(255,255,255,.55); letter-spacing: .3px;
    }
  </style>
</head>
<body>
<div class="phone" style="display:flex;flex-direction:column;">
  <div class="call-screen">
    <div class="glow-1"></div>
    <div class="glow-2"></div>

    <!-- Top bar -->
    <div class="call-topbar">
      <div style="width:36px;"></div><!-- spacer -->
      <div class="topbar-label">Voice Call</div>
      <div class="topbar-btn" onclick="toast('Pengaturan call')">⋯</div>
    </div>

    <!-- Center -->
    <div class="call-center">
      <div class="avatar-ring-wrap">
        <div class="pulse-ring"></div>
        <div class="pulse-ring-2"></div>
        <div class="pulse-ring-3"></div>
        <div class="call-avatar" id="callAvatar">AW</div>
      </div>

      <div class="call-name" id="callName">Dr. Amara Wijaya</div>
      <div class="call-role" id="callRole">Psikolog Klinis</div>

      <div class="call-status-wrap" id="statusWrap">
        <div class="status-dot" id="statusDot" style="display:none;"></div>
        <div class="call-timer connecting" id="callTimer">Menghubungkan...</div>
      </div>
    </div>

    <!-- Controls -->
    <div class="call-actions">
      <!-- 3 buttons: speaker | end-call | mute -->
      <div class="ctrl-row">
        <!-- Speaker -->
        <div class="ctrl-btn">
          <div class="ctrl-circle" id="speakerBtn" onclick="toggleSpeaker()">🔈</div>
          <div class="ctrl-label" id="speakerLabel">Speaker</div>
        </div>

        <!-- End call — center -->
        <div class="end-btn-wrap">
          <div class="end-circle" onclick="endCall()">📵</div>
          <div class="end-label">Akhiri</div>
        </div>

        <!-- Mute -->
        <div class="ctrl-btn">
          <div class="ctrl-circle" id="muteBtn" onclick="toggleMute()">🎙</div>
          <div class="ctrl-label" id="muteLabel">Mute</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../../js/app.js"></script>
<script>
  const params = getParams();
  const expert = DATA.experts.find(e => e.id == (params.expertId || 1)) || DATA.experts[0];

  // Populate expert info
  const av = document.getElementById('callAvatar');
  av.textContent = expert.init;
  av.style.background = expert.color;
  av.style.color = expert.textColor;
  document.getElementById('callName').textContent = expert.name;
  document.getElementById('callRole').textContent = expert.role;

  // Connecting → connected
  let sec = 0;
  let timerInterval = null;
  let connected = false;

  setTimeout(() => {
    connected = true;
    document.getElementById('statusDot').style.display = 'block';
    const timerEl = document.getElementById('callTimer');
    timerEl.classList.remove('connecting');
    timerEl.textContent = '00:00';

    timerInterval = setInterval(() => {
      sec++;
      const mm = String(Math.floor(sec / 60)).padStart(2, '0');
      const ss = String(sec % 60).padStart(2, '0');
      timerEl.textContent = mm + ':' + ss;
    }, 1000);
  }, 1800);

  // Speaker toggle
  let speakerOn = false;
  function toggleSpeaker() {
    speakerOn = !speakerOn;
    const btn = document.getElementById('speakerBtn');
    const lbl = document.getElementById('speakerLabel');
    btn.textContent = speakerOn ? '🔊' : '🔈';
    btn.classList.toggle('active', speakerOn);
    lbl.textContent = speakerOn ? 'Speaker On' : 'Speaker';
    toast(speakerOn ? '🔊 Loudspeaker aktif' : '🔈 Loudspeaker nonaktif');
  }

  // Mute toggle
  let muted = false;
  function toggleMute() {
    muted = !muted;
    const btn = document.getElementById('muteBtn');
    const lbl = document.getElementById('muteLabel');
    btn.textContent = muted ? '🎤' : '🎙';
    btn.classList.toggle('active', muted);
    lbl.textContent = muted ? 'Unmute' : 'Mute';
    toast(muted ? '🎤 Mikrofon dimatikan' : '🎙 Mikrofon aktif');
  }

  // End call
  function endCall() {
    if (timerInterval) clearInterval(timerInterval);
    toast('Sesi call diakhiri');
    setTimeout(() => go('chat-room', { expertId: expert.id || 1, mode: 'call' }), 400);
  }
</script>
</body>
</html>
